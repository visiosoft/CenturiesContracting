[build]
  base = "client"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

# Proxy API calls to Express backend
[[redirects]]
  from = "/api/*"
  to = "http://centuries.mypaperlessoffice.org:5020/api/:splat"
  status = 200
  force = true

# Serve index2.html directly (must be before SPA catch-all)
[[redirects]]
  from = "/index2.html"
  to = "/index2.html"
  status = 200
  force = true

# SPA fallback — must be last
# Note: /projects/* is served directly from client/public/projects/ by Netlify
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
