[build]
  base = "client"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

# Proxy API calls to Express backend
[[redirects]]
  from = "/api/*"
  to = "https://centuries.mypaperlessoffice.org/api/:splat"
  status = 200
  force = true

# Proxy project images to Express backend
[[redirects]]
  from = "/projects/*"
  to = "https://centuries.mypaperlessoffice.org/projects/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
